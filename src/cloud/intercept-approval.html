<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloud Intercept Approval</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --card: #ffffff;
        --border: #d9dee4;
        --text: #22303a;
        --muted: #5f7280;
        --accent: #0d8ddb;
        --danger: #c4382b;
      }
      body {
        margin: 0;
        font-family: "SF Mono", Menlo, Consolas, monospace;
        background: linear-gradient(120deg, #eef4fb 0%, #f8fafc 55%, #f4f7ef 100%);
        color: var(--text);
      }
      .wrap {
        max-width: 980px;
        margin: 24px auto;
        padding: 0 16px 24px;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 14px;
        box-shadow: 0 6px 20px rgba(17, 29, 45, 0.05);
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 14px;
        align-items: start;
      }
      .main {
        min-width: 0;
      }
      .sidebar .panel {
        position: sticky;
        top: 16px;
      }
      .title {
        margin: 0 0 10px;
        font-size: 18px;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      input {
        padding: 7px 8px;
        border: 1px solid var(--border);
        border-radius: 7px;
        min-width: 200px;
      }
      button {
        padding: 7px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
      }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      button.danger {
        background: var(--danger);
        border-color: var(--danger);
        color: #fff;
      }
      .meta {
        color: var(--muted);
        font-size: 12px;
      }
      .stat {
        display: inline-block;
        margin-right: 16px;
      }
      .item {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 8px;
      }
      .item pre {
        margin: 8px 0 0;
        padding: 8px;
        border-radius: 6px;
        background: #f7f9fb;
        border: 1px solid var(--border);
        overflow: auto;
        max-height: 200px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .tool {
        font-weight: 700;
      }
      .decision-pill {
        display: inline-block;
        margin-left: 8px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        border: 1px solid var(--border);
        color: var(--muted);
        background: #f7f9fb;
        text-transform: uppercase;
        letter-spacing: 0.2px;
      }
      .decision-allow {
        color: #0f7a3a;
        border-color: #89d6aa;
        background: #ecfff3;
      }
      .decision-deny {
        color: #b12a1e;
        border-color: #edb0aa;
        background: #fff1f0;
      }
      .decision-wait {
        color: #8b6b11;
        border-color: #e7d5a1;
        background: #fff9e8;
      }
      .empty {
        color: var(--muted);
      }
      .error {
        color: var(--danger);
      }
      .kv {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 6px 10px;
        font-size: 13px;
      }
      .preview {
        margin-top: 8px;
        padding: 8px;
        border-radius: 6px;
        background: #f7f9fb;
        border: 1px solid var(--border);
        white-space: pre-wrap;
        word-break: break-word;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      th,
      td {
        border: 1px solid var(--border);
        padding: 6px 8px;
        text-align: left;
        vertical-align: top;
      }
      th {
        background: #f7f9fb;
      }
      .hero {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .token-cell {
        max-width: 320px;
        word-break: break-all;
      }
      @media (max-width: 920px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .sidebar .panel {
          position: static;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <h1 class="title">Approval Workspace</h1>
        <div class="row" style="justify-content: space-between;">
          <a href="/auth/users-ui" style="color: var(--accent); text-decoration: none; font-weight: 700;">Open user management</a>
        </div>
      </div>

      <div class="layout">
        <div class="main">
          <div class="panel" id="summary"></div>

          <div class="panel">
            <div id="list"></div>
          </div>

          <div class="panel">
            <h2 class="title">Recent Tool Calls</h2>
            <div id="toolCalls"></div>
          </div>
        </div>

        <aside class="sidebar">
          <div class="panel">
            <h1 class="title">Profile</h1>
            <div class="column" style="gap:12px;">
              <label>Auth Token <input id="token" type="text" placeholder="paste or issue token" /></label>
              <label>Decided By <input id="decidedBy" value="web-ui" /></label>
              <button id="refresh" class="primary">Refresh</button>
              <button id="auto">Auto 3s: ON</button>
            </div>
            <p class="meta" id="status">Loading...</p>
          </div>
        </aside>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const tokenInput = $("token");
      const decidedByInput = $("decidedBy");
      const statusEl = $("status");
      const listEl = $("list");
      const toolCallsEl = $("toolCalls");
      const summaryEl = $("summary");
      const refreshBtn = $("refresh");
      const autoBtn = $("auto");
      let timer = null;

      function headers() {
        const token = String(tokenInput.value || "").trim();
        const base = { "Content-Type": "application/json", Accept: "application/json" };
        if (token) {
          base.Authorization = "Bearer " + token;
        }
        return base;
      }

      function ts(ms) {
        if (!ms) return "-";
        return new Date(ms).toLocaleString();
      }

      async function fetchJson(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            ...(options.headers || {}),
            ...headers(),
          },
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || response.statusText || "request failed");
        }
        return payload;
      }

      async function decide(id, decision) {
        const decidedBy = String(decidedByInput.value || "").trim() || "web-ui";
        await fetchJson("/api/copilot/intercepts/decision", {
          method: "POST",
          body: JSON.stringify({
            id,
            decision,
            decidedBy,
            reason: "manual " + decision + " from " + decidedBy,
          }),
        });
        await refresh();
      }

      function renderState(state) {
        summaryEl.innerHTML =
          '<h1 class="title">State</h1>' +
          '<span class="stat"><strong>Total:</strong> ' + (state.total ?? 0) + "</span>" +
          '<span class="stat"><strong>Waiting:</strong> ' + (state.waiting ?? 0) + "</span>" +
          '<span class="stat"><strong>Running:</strong> ' + (state.running ?? 0) + "</span>" +
          '<span class="stat"><strong>Completed:</strong> ' + (state.completed ?? 0) + "</span>";
      }

      function renderList(items) {
        if (!Array.isArray(items) || items.length === 0) {
          listEl.innerHTML = '<p class="empty">No waiting requests.</p>';
          return;
        }

        listEl.innerHTML = "";
        for (const item of items) {
          const card = document.createElement("div");
          card.className = "item";
          card.innerHTML =
            '<div class="tool">' +
            (item.tool || "unknown") +
            ' <span class="meta">(' +
            item.id +
            ")</span></div>" +
            "<div>" +
            (item.hint || "-") +
            "</div>" +
            '<div class="meta">created: ' +
            ts(item.createdAtMs) +
            " | expires: " +
            ts(item.expiresAtMs) +
            "</div>" +
            '<div class="row" style="margin-top:8px;">' +
            '<button class="primary" data-action="allow">Allow</button>' +
            '<button class="danger" data-action="deny">Deny</button>' +
            "</div>";
          const allowBtn = card.querySelector('[data-action="allow"]');
          const denyBtn = card.querySelector('[data-action="deny"]');
          allowBtn.addEventListener("click", async () => {
            allowBtn.disabled = true;
            denyBtn.disabled = true;
            try {
              await decide(item.id, "allow");
            } catch (error) {
              statusEl.textContent = String(error.message || error);
              statusEl.className = "error";
              allowBtn.disabled = false;
              denyBtn.disabled = false;
            }
          });
          denyBtn.addEventListener("click", async () => {
            allowBtn.disabled = true;
            denyBtn.disabled = true;
            try {
              await decide(item.id, "deny");
            } catch (error) {
              statusEl.textContent = String(error.message || error);
              statusEl.className = "error";
              allowBtn.disabled = false;
              denyBtn.disabled = false;
            }
          });
          listEl.appendChild(card);
        }
      }

      function shorten(value, max = 500) {
        const text = String(value ?? "");
        if (text.length <= max) {
          return text;
        }
        return text.slice(0, max - 3) + "...";
      }

      function decisionLabel(decision) {
        const value = String(decision || "").trim().toLowerCase();
        if (value === "allow" || value === "approved") {
          return { text: "APPROVED", className: "decision-pill decision-allow" };
        }
        if (value === "deny" || value === "denied") {
          return { text: "DENIED", className: "decision-pill decision-deny" };
        }
        if (value === "wait" || value === "waiting") {
          return { text: "WAITING", className: "decision-pill decision-wait" };
        }
        return { text: "UNKNOWN", className: "decision-pill" };
      }

      function renderToolCalls(items) {
        if (!Array.isArray(items) || items.length === 0) {
          toolCallsEl.innerHTML = '<p class="empty">No tool calls yet.</p>';
          return;
        }

        toolCallsEl.innerHTML = "";
        for (const item of items) {
          const card = document.createElement("div");
          card.className = "item";
          const decision = decisionLabel(item.interceptDecision);
          const argsText = shorten(JSON.stringify(item.args ?? null, null, 2));
          const resultText = shorten(JSON.stringify(item.result ?? null, null, 2));
          const decisionMeta =
            "status: " +
            (item.interceptStatus || "-") +
            " | by: " +
            (item.interceptDecidedBy || "-") +
            " | at: " +
            ts(item.interceptDecidedAtMs || 0);
          card.innerHTML =
            '<div class="tool">' +
            (item.tool || "unknown") +
            '<span class="' +
            decision.className +
            '">' +
            decision.text +
            "</span>" +
            ' <span class="meta">(' +
            (item.id || "-") +
            ")</span></div>" +
            '<div class="meta">session: ' +
            (item.sessionId || "-") +
            " | time: " +
            ts(item.ts) +
            "</div>" +
            '<div class="meta">' +
            decisionMeta +
            "</div>" +
            (item.interceptReason
              ? '<div class="meta">reason: ' + shorten(item.interceptReason, 200) + "</div>"
              : "") +
            "<div><strong>Args</strong></div>" +
            "<pre>" +
            argsText +
            "</pre>" +
            "<div><strong>Result</strong></div>" +
            "<pre>" +
            resultText +
            "</pre>";
          toolCallsEl.appendChild(card);
        }
      }

      async function refresh() {
        statusEl.className = "meta";
        statusEl.textContent = "Refreshing...";
        try {
          const [stateRes, queueRes, toolCallsRes] = await Promise.all([
            fetchJson("/api/copilot/intercepts/state"),
            fetchJson("/api/copilot/intercepts/queue?status=waiting&limit=100"),
            fetchJson("/api/copilot/intercepts/tool-calls?limit=20"),
          ]);
          renderState(stateRes.state || {});
          renderList(queueRes.items || []);
          renderToolCalls(toolCallsRes.items || []);
          statusEl.textContent = "Updated at " + new Date().toLocaleTimeString();
        } catch (error) {
          statusEl.textContent = String(error.message || error);
          statusEl.className = "error";
        }
      }

      function toggleAuto() {
        if (timer) {
          clearInterval(timer);
          timer = null;
          autoBtn.textContent = "Auto 3s: OFF";
          return;
        }
        timer = setInterval(refresh, 3000);
        autoBtn.textContent = "Auto 3s: ON";
      }

      refreshBtn.addEventListener("click", refresh);
      autoBtn.addEventListener("click", toggleAuto);
      refresh();
      timer = setInterval(refresh, 3000);
    </script>
  </body>
</html>
